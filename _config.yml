# Site
title: "Codex Blog"
description: "Articles on agentic software engineering with Codex CLI"
url: "https://codex.danielvaughan.com"
baseurl: ""
repository: "danielvaughan/codex-blog"

# Theme
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "air"

# Build
permalink: /:year/:month/:day/:title/
timezone: Europe/London
markdown: kramdown

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Search
search: true
search_full_content: true

# Mermaid (rendered via _includes/head/custom.html)
mermaid:
  version: "10"

# Plugins (also listed in Gemfile)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-include-cache

# Author
author:
  name: "Daniel Vaughan"
  bio: "Building expertise in agentic software engineering with Codex CLI"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/danielvaughan"

# Defaults
defaults:
  # All posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      comments: false
      toc: true
      toc_sticky: true
  # All hand-authored pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Include _pages so Jekyll picks them up
include:
  - _pages

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - docs/
  - README.md
  - "*.gem"
  - "*.gemspec"
