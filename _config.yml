# Site
title: "Codex Blog"
description: "Articles on agentic software engineering with Codex CLI"
url: "https://codex.danielvaughan.com"
baseurl: ""
repository: "danielvaughan/codex-blog"

# Build
permalink: /:year/:month/:day/:title/
timezone: Europe/London
markdown: kramdown

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Mermaid (rendered via _includes/head/custom.html)
mermaid:
  version: "10"

# Plugins (jekyll-remote-theme is gone — minimal-mistakes is gone)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-include-cache

# SCSS load paths. _main-site/_sass is inside the site source root (the
# submodule lives at _main-site/), so safe-mode jekyll on GitHub Pages
# accepts it. Imports resolve in order: codex-blog's own _sass/ first,
# then the submodule's _sass/ for shared main-site styles.
sass:
  load_paths:
    - _sass
    - _main-site/_sass

# Author
author:
  name: "Daniel Vaughan"
  bio: "Building expertise in agentic software engineering with Codex CLI"
  twitter: "DanielVaughan"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/danielvaughan"

# Logo (consumed by jekyll-seo-tag for Organization schema)
logo: "/assets/images/daniel-vaughan-avatar.jpg"

# IndexNow API key — used by .github/workflows/indexnow.yml to ping the
# IndexNow API on every push that touches _posts/. The key file is at
# the site root (named {{key}}.txt with key as contents) so Bing and
# Yandex can verify ownership.
indexnow_key: "02bc222b25212df6c50e4a0673715a15"

# Search Console / Webmaster Tools verification. Each value is the
# content of the verification meta tag provided by the respective tool.
# Leave empty until you've verified the site and received the code.
# Example value format: "abc123XYZ..."  (no <meta> tag, just the content string)
verification:
  google: "tw2uNLn12neV_2jbwtD-iwu54fBRgkSwdvE3LIZsX9k"
  bing: "0D1B02687430025BFAB8A75BDA4FDA29"
  yandex: ""

# Twitter card defaults (consumed by jekyll-seo-tag)
twitter:
  username: "DanielVaughan"
  card: "summary_large_image"

# Other social profiles — consumed by jekyll-seo-tag for Person.sameAs
# in the generated BlogPosting JSON-LD, and referenced by our custom
# structured-data include for additional schema.
social:
  name: "Daniel Vaughan"
  links:
    - "https://www.linkedin.com/in/danielpvaughan"
    - "https://github.com/danielvaughan"
    - "https://twitter.com/DanielVaughan"

# Book (promoted via _includes/book-widget.html)
book:
  title: "Codex CLI"
  subtitle: "Agentic Engineering from First Principles"
  price_text: "From $19 · pay what you want"
  cover_url: "https://d2sofvawe08yqg.cloudfront.net/codex-cli/s_hero"
  leanpub_url: "https://leanpub.com/codex-cli/c/CODEXSITE20"

# Defaults
defaults:
  # Apply the OG fallback image to EVERY page so jekyll-seo-tag emits
  # og:image, twitter:image, and upgrades twitter:card to summary_large_image.
  # Individual posts can override by adding `image: /path/to/custom.png` in
  # their front matter. The image file is at assets/images/og-default.png
  # (created in the next task).
  - scope:
      path: ""
    values:
      image: "/assets/images/og-default.png"
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# Include _pages so Jekyll picks them up
include:
  - _pages

# Exclude
exclude:
  - _main-site
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - docs/
  - README.md
  - "*.gem"
  - "*.gemspec"
  - scripts/
