<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // 1) Hide body h1 that duplicates the page title.
    //    Many source articles begin with a markdown `# Title` line which
    //    becomes a second h1 inside .post-body, identical to the chrome's
    //    page title h1. We hide it to keep one logical h1 per page.
    var pageTitle = document.querySelector('.post-title');
    if (pageTitle) {
      var pageTitleText = pageTitle.textContent.trim();
      document.querySelectorAll('.post-body h1').forEach(function (h) {
        if (h.textContent.trim() === pageTitleText) {
          h.style.display = 'none';
        }
      });
    }

    // 2) Inline TOC builder — populates nav.post-toc from .post-body h2 elements.
    var nav = document.querySelector('nav.post-toc');
    if (!nav) return;
    var ul = nav.querySelector('ul');
    var headings = document.querySelectorAll('.post-body h2');
    if (headings.length === 0) {
      nav.setAttribute('hidden', '');
      return;
    }
    headings.forEach(function (h) {
      var id = h.id || h.textContent
        .toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/^-|-$/g, '');
      h.id = id;
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });
    nav.removeAttribute('hidden');
  });
</script>

{% if site.mermaid %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@{{ site.mermaid.version | default: 10 }}/dist/mermaid.esm.min.mjs';

  document.addEventListener('DOMContentLoaded', () => {
    // kramdown emits ```mermaid fences as <pre><code class="language-mermaid">...
    // mermaid.js expects <div class="mermaid">...</div>. Convert in place.
    document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentNode.parentNode.replaceChild(div, code.parentNode);
    });

    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    mermaid.run();
  });
</script>
{% endif %}
