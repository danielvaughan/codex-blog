<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // 1) Navbar toggler — replaces Bootstrap 4 JS collapse plugin. Tapping the
    //    hamburger button toggles the `show` class on the matching target.
    //    Bootstrap 4's .collapse.show { display: block; } (from the SCSS
    //    pipeline) handles the visual state; we only handle the click.
    //    This block MUST run first — later blocks early-return on non-post
    //    pages which would otherwise skip the navbar binding.
    var toggler = document.querySelector('.navbar-toggler');
    if (toggler) {
      var targetSel = toggler.getAttribute('data-target');
      var target = targetSel ? document.querySelector(targetSel) : null;
      if (target) {
        toggler.addEventListener('click', function (e) {
          e.preventDefault();
          var isShown = target.classList.toggle('show');
          toggler.setAttribute('aria-expanded', isShown ? 'true' : 'false');
        });
      }
    }

    // 2) Hide body h1 that duplicates the page title.
    //    Many source articles begin with a markdown `# Title` line which
    //    becomes a second h1 inside .post-body, identical to the chrome's
    //    page title h1. We hide it to keep one logical h1 per page.
    var pageTitle = document.querySelector('.post-title');
    if (pageTitle) {
      var pageTitleText = pageTitle.textContent.trim();
      document.querySelectorAll('.post-body h1').forEach(function (h) {
        if (h.textContent.trim() === pageTitleText) {
          h.style.display = 'none';
        }
      });
    }

    // 3) Wrap tables in a scrollable container so they stay full-width
    //    while still allowing horizontal scroll on narrow viewports.
    document.querySelectorAll('.post-body table').forEach(function (tbl) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-scroll';
      tbl.parentNode.insertBefore(wrapper, tbl);
      wrapper.appendChild(tbl);
    });

    // 4) Code blocks: inject language label + copy button.
    document.querySelectorAll('.post-body div.highlighter-rouge').forEach(function (block) {
      // Language label — extract from class e.g. "language-bash"
      var langMatch = block.className.match(/language-(\S+)/);
      if (langMatch) {
        block.setAttribute('data-lang', langMatch[1]);
      }

      // Copy button
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.textContent = 'Copy';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.addEventListener('click', function () {
        var code = block.querySelector('pre');
        if (!code) return;
        navigator.clipboard.writeText(code.textContent.trim()).then(function () {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
      block.style.position = 'relative';
      block.appendChild(btn);
    });

    // 5) Inline TOC builder — populates nav.post-toc from .post-body h2 elements.
    var nav = document.querySelector('nav.post-toc');
    if (!nav) return;
    var ul = nav.querySelector('ul');
    var headings = document.querySelectorAll('.post-body h2');
    if (headings.length === 0) {
      nav.setAttribute('hidden', '');
      return;
    }
    headings.forEach(function (h) {
      var id = h.id || h.textContent
        .toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/^-|-$/g, '');
      h.id = id;
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });
    nav.removeAttribute('hidden');
  });
</script>

{% if site.mermaid %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@{{ site.mermaid.version | default: 10 }}/dist/mermaid.esm.min.mjs';

  document.addEventListener('DOMContentLoaded', () => {
    // kramdown emits ```mermaid fences as <pre><code class="language-mermaid">...
    // mermaid.js expects <div class="mermaid">...</div>. Convert in place.
    document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentNode.parentNode.replaceChild(div, code.parentNode);
    });

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: 'base',
      themeVariables: {
        // Primary palette — matches $primary (#0869ff) and site grays
        primaryColor: '#0869ff',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#0555cc',
        // Secondary / tertiary nodes
        secondaryColor: '#e8f0fe',
        secondaryTextColor: '#343a40',
        secondaryBorderColor: '#0869ff',
        tertiaryColor: '#f8f9fa',
        tertiaryTextColor: '#343a40',
        tertiaryBorderColor: '#ced4da',
        // Lines and labels — dark text so edge labels are readable
        lineColor: '#5a5a5a',
        textColor: '#343a40',
        edgeLabelBackground: '#ffffff',
        // Flowchart specifics
        nodeBorder: '#0555cc',
        mainBkg: '#0869ff',
        clusterBkg: '#f0f5ff',
        clusterBorder: '#a4c4f7',
        // Fonts — match blog headings
        fontFamily: 'Montserrat, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        fontSize: '14px',
      }
    });
    mermaid.run();
  });
</script>
{% endif %}
